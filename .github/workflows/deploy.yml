name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: viewer

      - name: Copy data files
        run: |
          rm -f public/asset-details.json
          cp ../asset-details.json public/asset-details.json
          rm -rf public/thumbnails
          cp -r ../thumbnails public/thumbnails
        working-directory: viewer

      - name: Build
        run: npm run build
        working-directory: viewer

      - name: Copy 404.html for SPA routing
        run: cp viewer/dist/index.html viewer/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
